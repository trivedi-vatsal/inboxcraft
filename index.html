<!doctype html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <!-- Prevent flash of wrong theme before React mounts -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark) || (stored === 'system' && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>
    <style>
      html.dark body { background-color: #020617; }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />

    <!-- Favicon (inlined to avoid base-path issues on sub-directory deployments) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234f46e5'/%3E%3Crect x='4' y='10' width='24' height='16' rx='2' fill='white' opacity='0.95'/%3E%3Cpath d='M4 12 L16 20 L28 12 L28 10 L4 10 Z' fill='%234f46e5'/%3E%3C/svg%3E" />

    <!-- Primary Meta Tags -->
    <title>InboxCraft - Outlook Inbox Rules Generator</title>
    <meta name="title" content="InboxCraft - Outlook Inbox Rules Generator" />
    <meta name="description" content="Stop manually creating Outlook rules. Paste your sender list and instantly generate a safe, private PowerShell script to automate your inbox organization in seconds." />
    <meta name="author" content="trivedi-vatsal" />
    <meta name="theme-color" content="#533afd" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://inboxcraft.app/" />
    <meta property="og:title" content="InboxCraft - Outlook Inbox Rules Generator" />
    <meta property="og:description" content="Stop manually creating Outlook rules. Paste your sender list and instantly generate a safe, private PowerShell script to automate your inbox organization in seconds." />
    <meta property="og:image" content="https://inboxcraft.app/og-image.png" />
    <meta property="og:site_name" content="InboxCraft" />

    <!-- X (Twitter) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://inboxcraft.app/" />
    <meta property="twitter:title" content="InboxCraft - Outlook Inbox Rules Generator" />
    <meta property="twitter:description" content="Stop manually creating Outlook rules. Paste your sender list and instantly generate a safe, private PowerShell script to automate your inbox organization in seconds." />
    <meta property="twitter:image" content="https://inboxcraft.app/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://inboxcraft.app/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@500;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-white min-h-screen overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
